- id: "AC-001"
  question: "波音737的机翼主要由哪些部件组成？"
  ground_truth: "机翼由翼梁、翼肋、桁条、蒙皮以及前后缘装置如襟翼、缝翼、副翼等组成"
  collection: "aircraft_structure"
  difficulty: "easy"
  category: "factual"

- id: "AC-002"
  question: "飞机襟翼的主要作用是什么？"
  ground_truth: "襟翼用于增加机翼面积和弯度，提高低速飞行时的升力，主要用于起飞和着陆阶段"
  collection: "aircraft_structure"
  difficulty: "easy"
  category: "factual"

- id: "AC-003"
  question: "什么是飞机的起落架减震支柱？"
  ground_truth: "起落架减震支柱是利用油气混合或弹簧机构吸收着陆冲击能量的装置"
  collection: "aircraft_structure"
  difficulty: "medium"
  category: "definition"

- id: "AC-004"
  question: "飞机的水平尾翼和垂直尾翼各自承担什么功能？"
  ground_truth: "水平尾翼提供俯仰稳定性，垂直尾翼提供方向稳定性"
  collection: "aircraft_structure"
  difficulty: "easy"
  category: "factual"

- id: "AC-005"
  question: "涡轮风扇发动机和涡轮喷气发动机的主要区别是什么？"
  ground_truth: "涡扇发动机通过风扇产生大量外涵道气流，涵道比高，燃油效率更好；涡喷发动机所有气流都经过核心机，高速性能更好"
  collection: "aircraft_structure"
  difficulty: "medium"
  category: "comparison"

- id: "AC-006"
  question: "复合材料和传统铝合金在飞机制造中各有什么优缺点？"
  ground_truth: "复合材料重量更轻、耐疲劳性好但成本高、维修复杂；铝合金成熟可靠、易维修但较重"
  collection: "aircraft_structure"
  difficulty: "hard"
  category: "comparison"

- id: "AC-007"
  question: "飞机的机身结构有哪些主要形式？"
  ground_truth: "主要包括桁架式、半硬壳式和硬壳式结构"
  collection: "aircraft_structure"
  difficulty: "medium"
  category: "factual"

- id: "AC-008"
  question: "飞行控制系统中，电传操纵和机械操纵有何不同？"
  ground_truth: "电传操纵通过电子信号传输飞行员指令，机械操纵通过钢索和连杆直接传动"
  collection: "aircraft_structure"
  difficulty: "medium"
  category: "comparison"

- id: "FO-001"
  question: "起飞前驾驶员必须完成的检查单包括哪些主要内容？"
  ground_truth: "包括飞行前检查、发动机启动检查、滑行前检查、起飞前检查等，涵盖飞行控制、发动机参数、导航设置和客舱准备"
  collection: "flight_ops"
  difficulty: "medium"
  category: "procedural"

- id: "FO-002"
  question: "V1速度的定义是什么？"
  ground_truth: "V1是起飞决策速度，在此速度之前可以中止起飞，超过此速度后必须继续起飞"
  collection: "flight_ops"
  difficulty: "easy"
  category: "definition"

- id: "FO-003"
  question: "什么条件下需要执行复飞程序？"
  ground_truth: "不稳定进近、跑道入侵、风切变警告、ATC指令或能见度不足时需执行复飞"
  collection: "flight_ops"
  difficulty: "medium"
  category: "procedural"

- id: "FO-004"
  question: "侧风着陆的基本技术要领是什么？"
  ground_truth: "使用蟹形进场法或侧滑法修正偏流，接地前蹬舵对齐跑道中线，同时压副翼防止上风侧机翼抬起"
  collection: "flight_ops"
  difficulty: "hard"
  category: "procedural"

- id: "FO-005"
  question: "飞机失速是如何发生的？如何改出失速？"
  ground_truth: "当迎角超过临界迎角时发生失速，改出方法是推杆减小迎角、增加推力、保持机翼水平"
  collection: "flight_ops"
  difficulty: "medium"
  category: "procedural"

- id: "FO-006"
  question: "巡航阶段飞行员需要监控哪些关键参数？"
  ground_truth: "高度、空速、航向、发动机参数（N1/N2/EGT/燃油流量）、导航信息、气象雷达"
  collection: "flight_ops"
  difficulty: "easy"
  category: "factual"

- id: "FO-007"
  question: "自动驾驶仪的基本工作模式有哪些？"
  ground_truth: "高度保持、航向保持/选择、垂直速度、飞行指引、导航模式、进近模式等"
  collection: "flight_ops"
  difficulty: "medium"
  category: "factual"

- id: "FO-008"
  question: "发动机空中停车的应急处理程序是什么？"
  ground_truth: "保持飞机控制、检查发动机参数、尝试空中重新启动、向ATC报告紧急情况、准备单发着陆"
  collection: "flight_ops"
  difficulty: "hard"
  category: "procedural"

- id: "RG-001"
  question: "中国民航局对飞行员的体检标准是什么？"
  ground_truth: "需满足CCAR-67部规定的医学标准，包括视力、听力、心血管等全面检查"
  collection: "regulations"
  difficulty: "medium"
  category: "factual"

- id: "RG-002"
  question: "什么是适航指令？它的法律效力如何？"
  ground_truth: "适航指令(AD)是局方对存在不安全因素的航空器发布的强制性纠正措施文件，具有强制执行力"
  collection: "regulations"
  difficulty: "medium"
  category: "definition"

- id: "RG-003"
  question: "商业飞行员执照获取的基本要求有哪些？"
  ground_truth: "包括最低飞行小时数、理论考试、实践考试、体检合格证、年龄和语言能力要求"
  collection: "regulations"
  difficulty: "easy"
  category: "factual"

- id: "RG-004"
  question: "飞机维修人员的资质等级如何划分？"
  ground_truth: "按CCAR-66部分为部件修理人员、航空器维修人员等类别，各类别有不同专业和机型签署要求"
  collection: "regulations"
  difficulty: "hard"
  category: "factual"
